<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090807"/>
      <stop offset="100%" stop-color="#141211"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b18"/>
      <stop offset="100%" stop-color="#141211"/>
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1610"/>
      <stop offset="100%" stop-color="#14110e"/>
    </linearGradient>
    <linearGradient id="routerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#12100e"/>
    </linearGradient>
    <linearGradient id="providerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161412"/>
      <stop offset="100%" stop-color="#100e0c"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a8a29e"/>
    </marker>
    <marker id="amberArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#f5f5f4" font-size="22" font-weight="700" letter-spacing="1">Claude Free Play — Architecture</text>
  <text x="600" y="65" text-anchor="middle" fill="#a8a29e" font-size="12" font-weight="400" letter-spacing="2">Multi-Provider Model Gateway with Key Rotation</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 1: CLIENTS -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="40" y="100" width="220" height="560" rx="10" fill="none" stroke="#44403c" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="150" y="125" text-anchor="middle" fill="#78716c" font-size="11" font-weight="600" letter-spacing="1.5">AI CLIENTS</text>

  <!-- Claude Client -->
  <g filter="url(#shadow)">
    <rect x="60" y="150" width="180" height="70" rx="10" fill="url(#clientGrad)" stroke="#f97316" stroke-width="1.5"/>
    <circle cx="90" cy="185" r="14" fill="#f97316" opacity="0.15"/>
    <text x="90" y="190" text-anchor="middle" fill="#f97316" font-size="14" font-weight="600">C</text>
    <text x="115" y="180" fill="#f5f5f4" font-size="13" font-weight="600">Claude Code</text>
    <text x="115" y="195" fill="#a8a29e" font-size="10">Anthropic Messages API</text>
  </g>

  <!-- Codex Client -->
  <g filter="url(#shadow)">
    <rect x="60" y="245" width="180" height="70" rx="10" fill="url(#clientGrad)" stroke="#f97316" stroke-width="1.5"/>
    <circle cx="90" cy="280" r="14" fill="#f97316" opacity="0.15"/>
    <text x="90" y="285" text-anchor="middle" fill="#f97316" font-size="14" font-weight="600">X</text>
    <text x="115" y="275" fill="#f5f5f4" font-size="13" font-weight="600">Codex CLI</text>
    <text x="115" y="290" fill="#a8a29e" font-size="10">OpenAI Responses API</text>
  </g>

  <!-- Any Client -->
  <g filter="url(#shadow)">
    <rect x="60" y="340" width="180" height="70" rx="10" fill="url(#clientGrad)" stroke="#57534e" stroke-width="1"/>
    <circle cx="90" cy="375" r="14" fill="#57534e" opacity="0.2"/>
    <text x="90" y="380" text-anchor="middle" fill="#a8a29e" font-size="14" font-weight="600">◆</text>
    <text x="115" y="370" fill="#f5f5f4" font-size="13" font-weight="600">Any AI Client</text>
    <text x="115" y="385" fill="#a8a29e" font-size="10">OpenAI-compatible</text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 2: GATEWAY -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="320" y="100" width="220" height="560" rx="10" fill="url(#amberGlow)" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="430" y="125" text-anchor="middle" fill="#f97316" font-size="11" font-weight="700" letter-spacing="1.5" filter="url(#glow)">FC-PLAY GATEWAY</text>

  <!-- /messages endpoint -->
  <g filter="url(#shadow)">
    <rect x="340" y="150" width="180" height="80" rx="10" fill="url(#gatewayGrad)" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect x="340" y="150" width="180" height="24" rx="10" fill="#f97316" fill-opacity="0.1"/>
    <text x="430" y="166" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">POST /v1/messages</text>
    <text x="430" y="190" text-anchor="middle" fill="#f5f5f4" font-size="12" font-weight="500">Messages API</text>
    <text x="430" y="206" text-anchor="middle" fill="#a8a29e" font-size="10">Anthropic-compatible</text>
  </g>

  <!-- /chat endpoint -->
  <g filter="url(#shadow)">
    <rect x="340" y="255" width="180" height="80" rx="10" fill="url(#gatewayGrad)" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect x="340" y="255" width="180" height="24" rx="10" fill="#f97316" fill-opacity="0.1"/>
    <text x="430" y="271" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">POST /v1/chat/completions</text>
    <text x="430" y="295" text-anchor="middle" fill="#f5f5f4" font-size="12" font-weight="500">Chat API</text>
    <text x="430" y="311" text-anchor="middle" fill="#a8a29e" font-size="10">OpenAI-compatible</text>
  </g>

  <!-- Admin Panel -->
  <g filter="url(#shadow)">
    <rect x="340" y="360" width="180" height="80" rx="10" fill="url(#gatewayGrad)" stroke="#d97706" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="340" y="360" width="180" height="24" rx="10" fill="#d97706" fill-opacity="0.08"/>
    <text x="430" y="376" text-anchor="middle" fill="#d97706" font-size="10" font-weight="600">GET /admin</text>
    <text x="430" y="400" text-anchor="middle" fill="#f5f5f4" font-size="12" font-weight="500">Admin Console</text>
    <text x="430" y="416" text-anchor="middle" fill="#a8a29e" font-size="10">Bento Grid · Glassmorphism</text>
  </g>

  <!-- Terminal Dashboard -->
  <g filter="url(#shadow)">
    <rect x="340" y="465" width="180" height="70" rx="10" fill="url(#gatewayGrad)" stroke="#57534e" stroke-width="1"/>
    <rect x="340" y="465" width="180" height="24" rx="10" fill="#57534e" fill-opacity="0.1"/>
    <text x="430" y="481" text-anchor="middle" fill="#a8a29e" font-size="10" font-weight="600">fc-play tui</text>
    <text x="430" y="505" text-anchor="middle" fill="#f5f5f4" font-size="12" font-weight="500">Terminal Dashboard</text>
    <text x="430" y="520" text-anchor="middle" fill="#a8a29e" font-size="10">Rich TUI · OLED Dark</text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 3: ROUTING LAYER -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="600" y="100" width="220" height="560" rx="10" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.25"/>
  <text x="710" y="125" text-anchor="middle" fill="#f97316" font-size="11" font-weight="600" letter-spacing="1.5" opacity="0.7">ROUTING LAYER</text>

  <!-- Model Resolution -->
  <g filter="url(#shadow)">
    <rect x="620" y="150" width="180" height="65" rx="10" fill="url(#routerGrad)" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="710" y="176" text-anchor="middle" fill="#f97316" font-size="13" font-weight="600">Model Resolution</text>
    <text x="710" y="194" text-anchor="middle" fill="#a8a29e" font-size="10">opus · sonnet · haiku → custom model</text>
  </g>

  <!-- Key Rotation -->
  <g filter="url(#shadow)">
    <rect x="620" y="240" width="180" height="85" rx="10" fill="url(#routerGrad)" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="710" y="266" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">Key Rotation</text>
    <text x="710" y="284" text-anchor="middle" fill="#a8a29e" font-size="10">Round-robin multi-key</text>
    <text x="710" y="299" text-anchor="middle" fill="#a8a29e" font-size="10">Exponential backoff</text>
    <text x="710" y="314" text-anchor="middle" fill="#a8a29e" font-size="10">Health tracking</text>
  </g>

  <!-- Provider Routing -->
  <g filter="url(#shadow)">
    <rect x="620" y="350" width="180" height="65" rx="10" fill="url(#routerGrad)" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="710" y="376" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">Provider Router</text>
    <text x="710" y="394" text-anchor="middle" fill="#a8a29e" font-size="10">Anthropic / OpenAI routing</text>
  </g>

  <!-- Config -->
  <g filter="url(#shadow)">
    <rect x="620" y="440" width="180" height="65" rx="10" fill="url(#routerGrad)" stroke="#d97706" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="710" y="466" text-anchor="middle" fill="#d97706" font-size="13" font-weight="600">Config Engine</text>
    <text x="710" y="484" text-anchor="middle" fill="#a8a29e" font-size="10">ENV · JSON · Live apply</text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 4: PROVIDERS -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="880" y="100" width="280" height="560" rx="10" fill="none" stroke="#44403c" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="1020" y="125" text-anchor="middle" fill="#78716c" font-size="11" font-weight="600" letter-spacing="1.5">20+ PROVIDERS</text>

  <!-- Anthropic -->
  <g filter="url(#shadow)">
    <rect x="900" y="145" width="120" height="50" rx="8" fill="url(#providerGrad)" stroke="#f97316" stroke-width="1.2"/>
    <text x="960" y="167" text-anchor="middle" fill="#f97316" font-size="11" font-weight="600">Anthropic</text>
    <text x="960" y="181" text-anchor="middle" fill="#a8a29e" font-size="9">Claude Opus/Sonnet/Haiku</text>
  </g>

  <!-- OpenAI -->
  <g filter="url(#shadow)">
    <rect x="1040" y="145" width="110" height="50" rx="8" fill="url(#providerGrad)" stroke="#22c55e" stroke-width="1.2"/>
    <text x="1095" y="167" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">OpenAI</text>
    <text x="1095" y="181" text-anchor="middle" fill="#a8a29e" font-size="9">GPT-4o · o3 · o4-mini</text>
  </g>

  <!-- Row 2: OpenRouter & Gemini -->
  <g filter="url(#shadow)">
    <rect x="900" y="210" width="120" height="50" rx="8" fill="url(#providerGrad)" stroke="#a855f7" stroke-width="1.2"/>
    <text x="960" y="232" text-anchor="middle" fill="#a855f7" font-size="11" font-weight="600">OpenRouter</text>
    <text x="960" y="246" text-anchor="middle" fill="#a8a29e" font-size="9">Multi-model router</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1040" y="210" width="110" height="50" rx="8" fill="url(#providerGrad)" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="1095" y="232" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="600">Gemini</text>
    <text x="1095" y="246" text-anchor="middle" fill="#a8a29e" font-size="9">Gemini 2.5 Pro/Flash</text>
  </g>

  <!-- Row 3: DeepSeek & Mistral -->
  <g filter="url(#shadow)">
    <rect x="900" y="275" width="120" height="50" rx="8" fill="url(#providerGrad)" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="960" y="297" text-anchor="middle" fill="#06b6d4" font-size="11" font-weight="600">DeepSeek</text>
    <text x="960" y="311" text-anchor="middle" fill="#a8a29e" font-size="9">V3 · R1</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1040" y="275" width="110" height="50" rx="8" fill="url(#providerGrad)" stroke="#f43f5e" stroke-width="1.2"/>
    <text x="1095" y="297" text-anchor="middle" fill="#f43f5e" font-size="11" font-weight="600">Mistral</text>
    <text x="1095" y="311" text-anchor="middle" fill="#a8a29e" font-size="9">Large · Small · Nemo</text>
  </g>

  <!-- Row 4: Groq & Fireworks -->
  <g filter="url(#shadow)">
    <rect x="900" y="340" width="120" height="50" rx="8" fill="url(#providerGrad)" stroke="#10b981" stroke-width="1.2"/>
    <text x="960" y="362" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600">Groq</text>
    <text x="960" y="376" text-anchor="middle" fill="#a8a29e" font-size="9">Llama · Mixtral fast</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1040" y="340" width="110" height="50" rx="8" fill="url(#providerGrad)" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="1095" y="362" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">Fireworks</text>
    <text x="1095" y="376" text-anchor="middle" fill="#a8a29e" font-size="9">Llama · DeepSeek · Qwen</text>
  </g>

  <!-- Row 5: Together & Cerebras -->
  <g filter="url(#shadow)">
    <rect x="900" y="405" width="120" height="50" rx="8" fill="url(#providerGrad)" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="960" y="427" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600">Together</text>
    <text x="960" y="441" text-anchor="middle" fill="#a8a29e" font-size="9">Llama · Qwen · DeepSeek</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1040" y="405" width="110" height="50" rx="8" fill="url(#providerGrad)" stroke="#14b8a6" stroke-width="1.2"/>
    <text x="1095" y="427" text-anchor="middle" fill="#14b8a6" font-size="11" font-weight="600">Cerebras</text>
    <text x="1095" y="441" text-anchor="middle" fill="#a8a29e" font-size="9">Llama fast inference</text>
  </g>

  <!-- Row 6: NVIDIA NIM & Kimi -->
  <g filter="url(#shadow)">
    <rect x="900" y="470" width="120" height="50" rx="8" fill="url(#providerGrad)" stroke="#76b900" stroke-width="1.2"/>
    <text x="960" y="492" text-anchor="middle" fill="#76b900" font-size="11" font-weight="600">NVIDIA NIM</text>
    <text x="960" y="506" text-anchor="middle" fill="#a8a29e" font-size="9">Llama · Qwen · Nemotron</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1040" y="470" width="110" height="50" rx="8" fill="url(#providerGrad)" stroke="#ec4899" stroke-width="1.2"/>
    <text x="1095" y="492" text-anchor="middle" fill="#ec4899" font-size="11" font-weight="600">Kimi</text>
    <text x="1095" y="506" text-anchor="middle" fill="#a8a29e" font-size="9">Kimi K1.5 · Moonshot</text>
  </g>

  <!-- Row 7: Local Providers -->
  <g filter="url(#shadow)">
    <rect x="900" y="540" width="120" height="50" rx="8" fill="url(#providerGrad)" stroke="#78716c" stroke-width="1.2"/>
    <text x="960" y="562" text-anchor="middle" fill="#a8a29e" font-size="11" font-weight="600">Ollama</text>
    <text x="960" y="576" text-anchor="middle" fill="#a8a29e" font-size="9">Local · Llama · Qwen</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1040" y="540" width="110" height="50" rx="8" fill="url(#providerGrad)" stroke="#78716c" stroke-width="1.2"/>
    <text x="1095" y="562" text-anchor="middle" fill="#a8a29e" font-size="11" font-weight="600">LM Studio</text>
    <text x="1095" y="576" text-anchor="middle" fill="#a8a29e" font-size="9">Local OpenAI server</text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ARROWS: Clients → Gateway -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="240" y1="185" x2="335" y2="185" stroke="#a8a29e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="240" y1="280" x2="335" y2="290" stroke="#a8a29e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="240" y1="375" x2="335" y2="290" stroke="#a8a29e" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.3" stroke-dasharray="4,3"/>

  <!-- Admin config back to router -->
  <line x1="520" y1="400" x2="615" y2="470" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.5" stroke-dasharray="5,3"/>

  <!-- Arrows: Gateway → Routing -->
  <line x1="520" y1="190" x2="615" y2="180" stroke="#f97316" stroke-width="2" marker-end="url(#amberArrow)" opacity="0.7"/>
  <line x1="520" y1="295" x2="615" y2="180" stroke="#f97316" stroke-width="2" marker-end="url(#amberArrow)" opacity="0.7"/>

  <!-- Arrows: Routing → Providers -->
  <line x1="800" y1="180" x2="895" y2="170" stroke="#a8a29e" stroke-width="2" marker-end="url(#arrow)" opacity="0.5"/>
  <line x1="800" y1="180" x2="1035" y2="170" stroke="#a8a29e" stroke-width="2" marker-end="url(#arrow)" opacity="0.5"/>
  <line x1="800" y1="385" x2="895" y2="365" stroke="#a8a29e" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.4"/>
  <line x1="800" y1="385" x2="1035" y2="365" stroke="#a8a29e" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.4"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FOOTER -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="40" y="675" fill="#57534e" font-size="9">Supports 20+ providers · Multi-key rotation · Exponential backoff · Compatible with Claude Code, Codex CLI & any OpenAI client</text>
  <text x="1160" y="675" text-anchor="end" fill="#57534e" font-size="9">XunowID · MIT License</text>
</svg>

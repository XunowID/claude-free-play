<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Free · Gateway Console</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23f97316'>⬡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="brandmark">CF</div>
      <div class="brandsep"></div>
      <nav class="topnav" id="topNav"></nav>
    </div>
    <div class="topbar-right">
      <span class="live-badge" id="liveBadge">
        <span class="live-dot"></span>
        <span class="live-text">Live</span>
      </span>
      <span class="version-tag">v1.0.0</span>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div class="page-head">
      <h1 id="pageTitle">Dashboard</h1>
      <div class="page-actions" id="pageActions"></div>
    </div>
    <div id="viewContainer" class="view-container"></div>
  </main>

  <!-- Action Bar -->
  <footer class="footbar" id="footbar">
    <div class="footbar-left">
      <span id="dirtyIndicator" class="dirty-indicator">
        <span class="di-dot"></span>
        <span class="di-text">No changes</span>
      </span>
    </div>
    <div class="footbar-center" id="footbarMsg"></div>
    <div class="footbar-right">
      <button class="btn btn-ghost" onclick="validateConfig()">Validate</button>
      <button class="btn btn-primary" id="applyBtn" disabled onclick="applyConfig()">Apply</button>
    </div>
  </footer>

  <!-- Toast -->
  <div id="toastBox" class="toast-box"></div>
</div>

<script src="/admin/assets/admin.js"></script>
</body>
</html>
